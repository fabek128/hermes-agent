name: Sync with upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/nousresearch/hermes-agent.git
          git fetch upstream

      - name: Merge upstream/main
        run: |
          git config user.name "fabek128"
          git config user.email "fabianfigueredo@gmail.com"
          git checkout main
          git merge upstream/main --no-edit || echo "Conflict detected, manual resolution needed"

      - name: Push changes
        if: success()
        run: |
          git push origin main
